<html lang="zh-TW" class="dark">
<head>

  <style>

    body {
      background-color: #0A0A0A;

        radial-gradient(at 0% 0%, rgba(245, 180, 0, 0.04) 0px, transparent 50%),

    }

    body:not(.theme-admin):not(.theme-member) {
      background-color: #F6F5EF;

    }

    .theme-admin .bg-slate-800,
    .theme-admin .bg-slate-800\/80 {
      background-color: #242830 !important;
    }

    .theme-admin .border-slate-900,
    .theme-admin .border-slate-900\/60,

    .theme-admin .text-slate-200,
    .theme-admin .text-slate-300 {

    }

    .theme-admin .text-slate-400 {

    }

    .theme-admin .text-slate-500,
    .theme-admin .text-slate-600 {

    .theme-admin .bg-gradient-to-r:not(.bg-clip-text),

    .theme-admin .border-brand-500\/50,

    .theme-admin .admin-summary-card {
      background: linear-gradient(180deg, rgba(27, 30, 34, 0.94), rgba(20, 23, 27, 0.94)) !important;
      border-color: #343A42 !important;

    .theme-member .bg-slate-950,

    .theme-member .bg-slate-950\/50,
    .theme-member .bg-slate-950\/60,

    .theme-member .bg-slate-900,
    .theme-member .bg-slate-900\/10,
    .theme-member .bg-slate-900\/20,
    .theme-member .bg-slate-900\/40,
    .theme-member .bg-slate-900\/60,

    }

    .theme-member .bg-slate-700 {

    .theme-member .border-slate-950,
    .theme-member .border-slate-900,
    .theme-member .border-slate-900\/60,
    .theme-member .border-slate-800,
    .theme-member .border-slate-800\/40,
    .theme-member .border-slate-800\/60,
    .theme-member .border-slate-800\/80,
    .theme-member .border-slate-700 {
      border-color: #DDD7CA !important;

    .theme-member .text-white,
    .theme-member .text-slate-100,
    .theme-member .text-slate-200,
    .theme-member .text-slate-300 {
      color: #171717 !important;
    }

    .theme-member .text-slate-400 {
      color: #6F716F !important;
    }

    .theme-member .text-slate-500,
    .theme-member .text-slate-600 {
      color: #8A867D !important;
    }

    .theme-member input,
    .theme-member select,
    .theme-member textarea {
      color: #171717 !important;
      background-color: #FFFFFF !important;
      border-color: #DDD7CA !important;

    .theme-member input::placeholder,
    .theme-member textarea::placeholder {

    .theme-member .bg-brand-500,
    .theme-member .bg-brand-600 {
      background-color: #171717 !important;

    }

    .theme-member .hover\:bg-brand-400:hover,
    .theme-member .hover\:bg-brand-500:hover {

    .theme-member .text-brand-400,

    .theme-member .border-brand-500,

    .theme-member .bg-brand-500\/20,

    }

    .theme-member .text-emerald-400,

    .theme-member .border-emerald-500\/30,
    .theme-member .border-emerald-500\/50 {

    }

    .theme-member .text-amber-400,
    .theme-member .text-yellow-400 {

    }

    .theme-member .bg-amber-500\/5,
    .theme-member .bg-amber-500\/10,
    .theme-member .bg-amber-950\/5,
    .theme-member .bg-yellow-500\/10 {
      background-color: rgba(244, 201, 93, 0.2) !important;
    }

    .theme-member .border-amber-500\/20,
    .theme-member .border-amber-500\/25,

    .theme-member .text-rose-400 {

    }

    .theme-member .bg-rose-500\/5,
    .theme-member .bg-rose-500\/10,
    .theme-member .bg-rose-600\/10 {

    }

    .theme-member .border-rose-500\/30 {

    .theme-member .text-blue-400 {

    .theme-member .bg-indigo-500\/5,

    .theme-member .bg-blue-600\/10,
    .theme-member .bg-purple-600\/10,
    .theme-member .bg-purple-600\/5 {

    }

    .theme-member .border-indigo-500\/20,
    .theme-member .border-indigo-500\/50 {

    }

    .theme-member .bg-gradient-to-r,
    .theme-member .bg-gradient-to-tr {
      background-image: none !important;
    }

    .theme-member .text-transparent.bg-clip-text {

    .theme-member .shadow-brand-500\/20,

    }

    /* 隱藏橫向滾動條 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 手機版表格外觀極致美化與防擠壓 */
    @media (max-width: 768px) {
      /* 將 Table 轉換為 Card-based Grid 佈局，實現手機版極致響應式，避免橫向滾動 */
      .overflow-x-auto table, 
      .overflow-x-auto thead, 
      .overflow-x-auto tbody, 
      .overflow-x-auto th, 
      .overflow-x-auto td, 
      .overflow-x-auto tr { 
        display: block !important; 
        width: 100% !important;
      }
      .overflow-x-auto thead {
        display: none !important; /* 手機端隱藏表頭 */
      }
      .overflow-x-auto tr {
        margin-bottom: 16px !important;
        background-color: rgba(30, 41, 59, 0.2) !important;
        border: 1px solid rgba(51, 65, 85, 0.3) !important;
        border-radius: 16px !important;
        padding: 14px 16px !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
      }
      .overflow-x-auto td {
        padding: 6px 0 !important;
        border: none !important;
        text-align: left !important;
      }
      .overflow-x-auto td:last-child {
        border-top: 1px solid rgba(51, 65, 85, 0.2) !important;
        padding-top: 12px !important;
        margin-top: 8px !important;
        display: flex !important;
        justify-content: flex-end !important;
        gap: 8px !important;
      }
    }

<body class="theme-member text-slate-200 min-h-screen flex flex-col antialiased" x-data="gymApp" x-init="init()">

  <!-- Global Toast Alerts -->
  <div class="fixed top-5 right-5 z-[60] flex flex-col gap-2 max-w-sm">
    <template x-for="toast in toasts" :key="toast.id">
      <div :class="{
        'bg-slate-900/90 border-emerald-500/30 text-emerald-400': toast.type === 'success',
        'bg-slate-900/90 border-rose-500/30 text-rose-400': toast.type === 'error',
        'bg-slate-900/90 border-brand-500/30 text-brand-400': toast.type === 'info'
      }" class="p-4 rounded-xl border backdrop-blur-md shadow-2xl flex items-center gap-3 transition-all duration-300">
        <span class="text-lg">⚡</span>
        <div class="flex-grow text-xs font-semibold" x-text="toast.message"></div>
        <button @click="removeToast(toast.id)" class="text-slate-500 hover:text-slate-300">&times;</button>
      </div>
    </template>
  </div>

  <!-- Header / Navigation -->
  <header class="border-b border-slate-800/80 bg-slate-950/40 backdrop-blur-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- SaaS Dynamic Brand Logo Container (w-10 h-10, inner icon w-6 h-6 / w-7 h-7) -->
        <div class="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center shadow-lg shadow-slate-950/50 overflow-hidden">
          <template x-if="brandLogoUrl">
            <img :src="brandLogoUrl" class="w-10 h-10 object-cover" alt="Logo">
          </template>
          <template x-if="!brandLogoUrl">
            <svg class="w-6 h-6 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </template>
        </div>
        <span class="text-xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent tracking-wide" x-text="brandTitle">GymOS</span>
      </div>

      <div class="flex items-center gap-3">
        <!-- Configuration settings -->
        <button x-show="currentMode === 'admin'" @click="showConfig = true" class="p-2 bg-slate-900 border border-slate-800 text-slate-400 hover:text-white rounded-lg transition-all" title="管理端系統設定">
          ⚙️
        </button>
        <div class="hidden sm:flex flex-col text-right">
          <span class="text-xs font-bold text-white" x-text="sessionUser.name"></span>
          <span class="text-[10px] text-slate-500 uppercase font-semibold" x-text="sessionUser.role"></span>
        </div>
      </div>
    </div>
  </header>

  <!-- Configuration Modal -->
  <div x-show="showConfig && currentMode === 'admin'" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50" x-transition>
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-md shadow-2xl relative space-y-5">
      <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <div class="flex items-center gap-2">
          <h3 class="text-lg font-bold text-white flex items-center gap-2">⚙️ 管理端系統設定</h3>
          <!-- Admin-only maintenance unlock: click version tag 5 times -->
          <span @click="unlockMaintenanceTools()" class="cursor-pointer px-2 py-0.5 text-[9px] font-semibold bg-brand-500/10 border border-brand-500/20 text-brand-500 rounded-full select-none" x-text="'v3.0 ' + currentMode.toUpperCase()"></span>
        </div>
        <button @click="showConfig = false" class="text-slate-400 hover:text-white text-lg">&times;</button>
      </div>
      
      <div class="space-y-4">
        <!-- LINE Message push quota saving toggle -->
        <div>
          <div class="mb-2 text-[10px] font-bold uppercase tracking-wider text-brand-500">一般管理設定</div>
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" x-model="lineAutoPushRenew" class="rounded border-slate-800 bg-slate-950 text-brand-500 focus:ring-brand-500 w-4 h-4">
            <span class="text-xs font-bold text-slate-300">開啟 LINE 繳費通知自動主動推送</span>
          </label>
          <p class="text-[10px] text-slate-500 mt-1">關閉時，學員需打開 LINE 個人首頁查閱帳單，能節省每月 LINE 免費推播額度。</p>
        </div>

        <div class="border-t border-slate-800 pt-4">
          <div class="mb-2 text-[10px] font-bold uppercase tracking-wider text-slate-500">系統資訊</div>
          <dl class="grid grid-cols-[88px_1fr] gap-x-3 gap-y-2 text-[10px]">
            <dt class="text-slate-500">目前登入者</dt>
            <dd class="text-slate-300" x-text="sessionUser.name + ' / ' + sessionUser.role"></dd>
            <dt class="text-slate-500">目前模式</dt>
            <dd class="text-slate-300" x-text="currentMode"></dd>
            <dt class="text-slate-500">版本</dt>
            <dd class="text-slate-300">v3.0</dd>
            <dt class="text-slate-500">後端 API</dt>
            <dd class="text-slate-400 break-all" x-text="gasUrl"></dd>
          </dl>
        </div>

        <!-- Admin maintenance tools ONLY options -->
        <template x-if="showDevOptions">
          <div class="space-y-4 pt-4 border-t border-slate-800" x-transition>
            <div>
              <label class="block text-xs font-bold text-slate-400 mb-1.5">後端 API 網址維護</label>
              <input type="text" x-model="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-brand-500">
              <p class="text-[10px] text-slate-500 mt-1">只有更換 Apps Script 部署網址時才需要調整。</p>
            </div>

            <div class="space-y-3 pt-3">
              <label class="block text-xs font-bold text-slate-400">⚙️ 頁面模式預覽</label>
              <div class="grid grid-cols-5 gap-1.5 text-center text-[9px]">
                <button @click="switchMode('admin'); showConfig = false" :class="currentMode === 'admin' ? 'bg-brand-500 text-slate-950 font-bold' : 'bg-slate-950 border border-slate-800 text-slate-400'" class="py-2.5 rounded-lg transition-all">管理端</button>
                <button @click="switchMode('bind'); showConfig = false" :class="currentMode === 'bind' ? 'bg-brand-500 text-slate-950 font-bold' : 'bg-slate-950 border border-slate-800 text-slate-400'" class="py-2.5 rounded-lg transition-all">學員綁定</button>
                <button @click="switchMode('leave'); showConfig = false" :class="currentMode === 'leave' ? 'bg-brand-500 text-slate-950 font-bold' : 'bg-slate-950 border border-slate-800 text-slate-400'" class="py-2.5 rounded-lg transition-all">請假申請</button>
                <button @click="switchMode('makeup'); showConfig = false" :class="currentMode === 'makeup' ? 'bg-brand-500 text-slate-950 font-bold' : 'bg-slate-950 border border-slate-800 text-slate-400'" class="py-2.5 rounded-lg transition-all">補課預約</button>
                <button @click="switchMode('enroll'); showConfig = false" :class="currentMode === 'enroll' ? 'bg-brand-500 text-slate-950 font-bold' : 'bg-slate-950 border border-slate-800 text-slate-400'" class="py-2.5 rounded-lg transition-all">學員加選</button>
              </div>
            </div>

            <div class="space-y-2 pt-3">

        addToast(message, type = 'success') {

        applyTheme() {
          const isAdmin = this.currentMode === 'admin';

          document.body.classList.toggle('theme-member', !isAdmin);
        },

        formatTime(timeStr) {
          if (!timeStr) return '';
          try {
            if (String(timeStr).includes('T')) {
              const d = new Date(timeStr);
              if (!isNaN(d.getTime())) {
                const hours = String(d.getHours()).padStart(2, '0');
                const minutes = String(d.getMinutes()).padStart(2, '0');
                return `${hours}:${minutes}`;
              }
            }
          } catch(e) {}
          return String(timeStr).substring(0, 5);
        },

        formatDateYMD(dateVal) {
          if (!dateVal) return '';
          try {
            if (typeof dateVal === 'string') {
              const match = dateVal.match(/^(\d{4}-\d{2}-\d{2})/);
              if (match) return match[1];
            }
            const d = new Date(dateVal);
            if (!isNaN(d.getTime())) {
              const y = d.getFullYear();
              const m = String(d.getMonth() + 1).padStart(2, '0');
              const day = String(d.getDate()).padStart(2, '0');
              return `${y}-${m}-${day}`;
            }
          } catch(e) {}
          return String(dateVal).substring(0, 10);
        },

        formatDateMMDD(dateStr) {
          if (!dateStr) return '';
          try {
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
              const m = String(d.getMonth() + 1).padStart(2, '0');
              const day = String(d.getDate()).padStart(2, '0');
              return `${m}/${day}`;
            }
          } catch(e) {}
          return dateStr;
        },

        getPeriodEndMMDD(startStr, weeks, classType) {
          if (!startStr) return '';
          try {
            const d = new Date(startStr);
            if (!isNaN(d.getTime())) {
              if (classType === 'B') {
                // 1-month period B class: end date is the last day of the starting month
                const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0);
                const m = String(lastDay.getMonth() + 1).padStart(2, '0');
                const day = String(lastDay.getDate()).padStart(2, '0');
                return `${m}/${day}`;
              } else {
                // 12-week class: end date is start date + (weeks * 7) - 1 day
                const w = Number(weeks) || 12;
                d.setDate(d.getDate() + (w * 7) - 1);
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${m}/${day}`;
              }
            }
          } catch(e) {}
          return '';
        },

        getUniqueClasses() {
          const seen = new Set();
          const list = [];
          if (Array.isArray(this.adminSessions)) {
            this.adminSessions.forEach(s => {
              if (s.classId && !seen.has(s.classId)) {
                seen.add(s.classId);
                list.push({ classId: s.classId, className: s.className });
              }
            });
          }
          return list;
        },

        getFilteredMakeups() {
          let list = this.availableSlots || [];
          const now = new Date();
          
          if (this.makeupForm.filterDate === '7days') {
            const limit = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
            list = list.filter(s => new Date(s.date) <= limit);
          } else if (this.makeupForm.filterDate === '14days') {
            const limit = new Date(now.getTime() + 14 * 24 * 60 * 60 * 1000);
            list = list.filter(s => new Date(s.date) <= limit);
          } else if (this.makeupForm.filterDate === 'morning') {
            list = list.filter(s => {
              const h = parseInt((s.startTime || '0').split(':')[0], 10);
              return h < 13;
            });
          } else if (this.makeupForm.filterDate === 'evening') {
            list = list.filter(s => {
              const h = parseInt((s.startTime || '0').split(':')[0], 10);
              return h >= 17;
            });
          }
          return list;
        },

        // Save backend settings
        async saveConfiguration() {
          localStorage.setItem('gymos_gas_url', this.gasUrl);
          localStorage.setItem('gymos_line_auto_push_renew', String(this.lineAutoPushRenew));
          if (this.currentMode === 'admin') {
            try {
              await this.apiCall('admin.saveSystemConfig', { key: 'LINE_AUTO_PUSH_RENEW', value: String(this.lineAutoPushRenew) });
            } catch(e) {
              console.error('Failed to sync LINE_AUTO_PUSH_RENEW to backend:', e);
            }
          }
          this.showConfig = false;
          this.addToast('管理設定已儲存。', 'success');
        },

        unlockMaintenanceTools() {
          if (this.currentMode !== 'admin') return;
          this.devClickCount++;
          if (this.devClickCount >= 5 && !this.showDevOptions) {
            this.showDevOptions = true;
            this.addToast('維護工具已開啟，請謹慎操作。', 'info');
          }
        },

        clearLocalIdentity() {
          localStorage.removeItem('gymos_dev_token');
          this.devToken = '';
          this.showConfig = false;
          this.addToast('已清除本機測試身分，正在重新載入...', 'success');
          setTimeout(() => window.location.reload(), 700);
        },
        
        async init() {
          if (this.initStarted) {
            console.info('[GymOS frontend perf]', { skipped: 'duplicate-init' });
            return;
          }
          this.initStarted = true;

          const perfStart = performance.now();
          const perfMarks = [];
          const markPerf = (label, extra = {}) => {
            perfMarks.push({
              label,
              ms: Math.round(performance.now() - perfStart),
              ...extra
            });
          };
          let isInLine = false;
          markPerf('init:start', {
            href: window.location.href,
            userAgent: navigator.userAgent
          });

          // 支援 LINE LIFF 特有的 liff.state 參數解碼（避免 LINE 導向時遺失 mode 等路由參數）
          let searchStr = window.location.search;
          const mainParams = new URLSearchParams(searchStr);
          const liffState = mainParams.get('liff.state');
          if (liffState) {
            searchStr = decodeURIComponent(liffState);
          }
          
          const params = new URLSearchParams(searchStr);
          const mode = params.get('mode');
          const isAdminRoute = mode === 'admin';
          markPerf('route:parsed', { mode: mode || 'default', isAdminRoute });
          // 此時還不設定 currentMode，等 LIFF 初始化完成後才在下方統一決定真實的 mode
          
          const apiParam = params.get('api') || mainParams.get('api');
          if (apiParam) {
            // 確保 GAS 網址保持乾淨，切掉任何意外尾隨的 liff 參數，防範 URL 污染
            let cleanApi = apiParam.split('?')[0].split('&')[0];
            this.gasUrl = cleanApi;
            localStorage.setItem('gymos_gas_url', cleanApi);
          }
          
          // 強大自我修復：確保任何從舊快取/localStorage 讀出的 GAS URL 都是 100% 乾淨的！
          if (this.gasUrl) {
            this.gasUrl = this.gasUrl.split('?')[0].split('&')[0];
            localStorage.setItem('gymos_gas_url', this.gasUrl);
          }
          markPerf('api:url-ready', { hasGasUrl: !!this.gasUrl });


          const liffId = '2010118365-aUSNBtpx';

                  // 🚀 頂級商業化：正式初始化 LINE LIFF SDK，解鎖手機 LINE 容器的安全性沙盒，並獲取學員真實身分！
                  if (typeof liff !== 'undefined') {
                    try {
                      markPerf('liff:sdk-ready');
                      this.activeLiffId = liffId;
                      
                      // 判斷是否在 LINE App 內 (包括 LINE 內建瀏覽器或 LIFF 容器)
                      isInLine = /Line/i.test(navigator.userAgent) || (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient());
                      markPerf('liff:environment', { isInLine });
                      
                      if (isInLine) {
                        // 在 LINE 內部，需要同步等待以獲取身份 Token，但最多只等 3.5 秒，逾時則轉為背景初始化且不阻礙用戶
                        markPerf('liff:init-start');
                        await Promise.race([
                          liff.init({ liffId: liffId }),
                          new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT')), 3500))
                        ]);
                        markPerf('liff:init-done');
                        
                        this.liffReady = true;
                        
                        markPerf('liff:isLoggedIn-start');
                        if (liff.isLoggedIn()) {
                          markPerf('liff:isLoggedIn-true');
                          const accessToken = liff.getAccessToken();
                          markPerf('liff:getAccessToken-done', { hasAccessToken: !!accessToken });
                          if (accessToken) {
                            this.devToken = accessToken;
                            localStorage.setItem('gymos_dev_token', accessToken);
                          }
                          markPerf('liff:getProfile-start');
                          const profile = await liff.getProfile();
                          markPerf('liff:getProfile-done');
                          this.sessionUser = {
                            uid: profile.userId,
                            role: 'member',
                            name: profile.displayName
                          };
                        } else {
                          markPerf('liff:isLoggedIn-false-login');
                          console.info('[GymOS frontend perf]', {
                            mode: mode || 'profile',
                            isInLine,
                            marks: perfMarks
                          });
                          liff.login();
                          return; // 正在進行 LINE 登入轉跳，停止加載後續 API
                        }
                      } else {
                        // 管理端在電腦瀏覽器開啟時，必須先完成 LINE Login 以取得 Staff 權限。
                        if (isAdminRoute) {
                          markPerf('liff:init-start');
                          await liff.init({ liffId: liffId });
                          markPerf('liff:init-done');
                          this.liffReady = true;
                          if (liff.isLoggedIn()) {
                            markPerf('liff:isLoggedIn-true');
                            const accessToken = liff.getAccessToken();
                            markPerf('liff:getAccessToken-done', { hasAccessToken: !!accessToken });
                            if (accessToken) {
                              this.devToken = accessToken;
                              localStorage.setItem('gymos_dev_token', accessToken);
                            }
                          } else {
                            markPerf('liff:isLoggedIn-false-login');
                            console.info('[GymOS frontend perf]', {
                              mode: mode || 'profile',
                              isInLine,
                              marks: perfMarks
                            });
                            liff.login({ redirectUri: window.location.href });
                            return;
                          }
                        } else {
                          // 在普通外部瀏覽器的一般學員頁，採非同步背景初始化，不阻塞首頁加載。
                          markPerf('liff:init-background-start');
                          liff.init({ liffId: liffId }).then(() => {
                            console.info('[GymOS LIFF background perf]', {
                              ms: Math.round(performance.now() - perfStart),
                              isLoggedIn: liff.isLoggedIn()
                            });
                            this.liffReady = true;
                            if (liff.isLoggedIn()) {
                              const accessToken = liff.getAccessToken();
                              if (accessToken) {
                                this.devToken = accessToken;
                                localStorage.setItem('gymos_dev_token', accessToken);
                              }
                            }
                          }).catch(e => console.warn('Non-blocking LIFF init failed:', e));
                        }
                      }
                    } catch (err) {
                      markPerf('liff:error', { message: err && err.message ? err.message : String(err) });
                      console.warn('⚡ LIFF SDK 初始化失敗或逾時，採模擬身份繼續載入：', err);
                    }
                  } else {
                    markPerf('liff:sdk-missing');
                  }

          // 4. 當連線設定與身份驗證都就緒後，再執行資料加載！
          try {
            if (!this.gasUrl) {
              this.showConfig = true;
              markPerf('api:url-missing');
            } else {
              // 統一路由決策：全部強制導向 profile 首頁，不再自動展開任何頁籤
              if (mode && mode !== 'leave' && mode !== 'makeup') {
                this.currentMode = mode;
              } else {
                this.currentMode = 'profile';
                this.activeSubView = '';
              }
              this.applyTheme();
              markPerf('loadInitialData:start', { currentMode: this.currentMode });
              await this.loadInitialData();
              markPerf('loadInitialData:done', { currentMode: this.currentMode });
            }
          } catch (e) {
            markPerf('init:error', { message: e && e.message ? e.message : String(e) });
            console.error('Initial load data failed:', e);
          } finally {
            this.appReady = true;
            this.applyTheme();
            markPerf('appReady:true', { currentMode: this.currentMode });
            console.info('[GymOS frontend perf]', {
              mode: this.currentMode || mode || 'profile',
              isInLine,
              marks: perfMarks
            });

        switchMode(mode) {
          this.currentMode = mode;
          this.applyTheme();
          // Set query param without reloading to support routing
          const url = new URL(window.location.href);
          url.searchParams.set('mode', mode);
          window.history.pushState({}, '', url);
          
          this.loadInitialData();
        },
        
        // Master API requester
        async apiCall(action, data = {}) {
          if (!this.gasUrl) {
            this.addToast('請先貼上有效的 Apps Script Web App API 網址！', 'error');
            this.showConfig = true;
            throw new Error('Missing GAS URL');
          }
          
          const apiStarted = performance.now();
          this.loading = true;
          try {
            const response = await fetch(this.gasUrl, {
              method: 'POST',
              mode: 'cors',
              headers: { 'Content-Type': 'text/plain' }, // 極致簡化，防範某些手機瀏覽器（iOS WKWebView）觸發 CORS OPTIONS 預檢阻擋
              body: JSON.stringify({
                action: action,
                token: this.devToken,
                data: data
              })
            });
            
            const res = await response.json();
            if (res.status !== 200) {
              throw new Error(res.data && res.data.error ? res.data.error : 'API 伺服器傳回錯誤');
            }
            console.info('[GymOS API perf]', {
              action,
              ms: Math.round(performance.now() - apiStarted)
            });
            return res.data;
          } catch (e) {
            console.info('[GymOS API perf]', {
              action,
              ms: Math.round(performance.now() - apiStarted),
              error: e && e.message ? e.message : String(e)
            });
            this.addToast(e.message || 'API 連線失敗，請檢查 API 網址是否正確並已啟用 CORS！', 'error');
            throw e;
          } finally {
            this.loading = false;
          }
        },
        
        // Load initial lists according to current mode
        async loadInitialData() {
          try {
            if (this.currentMode === 'admin') {
              const bootstrap = await this.apiCall('admin.bootstrap');
              const brandConfig = bootstrap.brandConfig || {};
              this.brandTitle = brandConfig.brandTitle || 'GymOS';
              this.brandLogoUrl = brandConfig.brandLogoUrl || '';
              document.title = this.brandTitle + ' — 智慧健身房管理系統';
              this.adminSessions = bootstrap.sessions || [];
              this.adminClasses = bootstrap.classes || [];
              this.pendingPayments = bootstrap.pendingPayments || [];
              this.adminDashboardStats = bootstrap.dashboardStats || { todaySessions: [], todayLeaves: [], todayMakeups: [] };
              this.announcements = bootstrap.announcements || [];
              this.adminRooms = (bootstrap.meta && bootstrap.meta.rooms) || [];
              this.adminCoaches = (bootstrap.meta && bootstrap.meta.coaches) || [];
              this.lineAutoPushRenew = !bootstrap.systemConfig || bootstrap.systemConfig.lineAutoPushRenew !== false;
              localStorage.setItem('gymos_line_auto_push_renew', String(this.lineAutoPushRenew));
            } else if (this.currentMode === 'bind') {
              // Student binding
            } else if (this.currentMode === 'enroll') {
              this.studentEnrollForm.successData = null;
              const res = await this.apiCall('member.getClassesForEnrollment');
              this.studentEnrollForm.classes = res.classes || [];
              this.studentEnrollForm.memberLevel = res.memberLevel || 'L1';
            } else if (this.currentMode === 'profile' || this.currentMode === 'leave' || this.currentMode === 'makeup') {
              // 單一 API 呼叫取得公告 + 學員資料 + 未來課堂 + 請假紀錄。
              const bootstrap = await this.apiCall('member.bootstrap');
              const info = bootstrap.info || {};
              const brandConfig = bootstrap.brandConfig || {};
              this.brandTitle = brandConfig.brandTitle || 'GymOS';
              this.brandLogoUrl = brandConfig.brandLogoUrl || '';
              document.title = this.brandTitle + ' — 智慧健身房管理系統';
              this.announcements = bootstrap.announcements || [];
              if (info.bound) {
                this.studentProfile.realName = info.realName;
                this.studentProfile.level = info.level;
                this.studentProfile.classNames = info.classNames || '';
                this.studentProfile.periodInfo = info.periodInfo || '';
                this.studentProfile.totalPaid = info.totalPaid || 0;
                this.studentProfile.attendedCount = info.attendedCount || 0;
                this.studentProfile.leaveCount = info.leaveCount || 0;
                this.studentProfile.makeupInfo = info.makeupInfo || '';
                this.studentProfile.makeupCount = info.makeupCount ?? 0;
                this.studentProfile.availableMakeupCount = info.availableMakeupCount ?? 0;
                this.studentProfile.remainingCount = info.remainingCount || 0;
                
                // 直接從 getInfo 回傳値中提取已內嵌的即時課堂與請假紀錄
                this.upcomingSessions = info.upcomingSessions || [];
                this.pendingLeaves = info.pendingLeaves || [];
              } else {
                this.addToast('您尚未綁定學員檔案，請先進行綁定。', 'info');
                this.currentMode = 'bind';
              }
            }
          } catch (e) {
            console.error('Initialization failed', e);
          }
        },
        
        // Admin functions
        async submitCreateClass() {
          try {
            const result = await this.apiCall('admin.createClass', this.classForm);
            this.addToast(`班級「${result.className}」建立成功！總共規劃 ${result.totalSessions} 堂課。`, 'success');
            
            // Trigger batch session expansion
            this.addToast('系統正在自動展開課堂排程並即時同步至 Google 日曆...', 'info');
            await this.apiCall('admin.generateSessions', { classId: result.classId });
            this.addToast('Google 日曆同步完成！課堂結構建構完成。', 'success');
          } catch (e) {
            console.error(e);
          }
        },
        
        async generateSessionsSingle(classId) {
          try {
            this.addToast('⚡ 系統正在單獨展開課堂排程並同步至 Google 日曆...', 'info');
            const res = await this.apiCall('admin.generateSessions', { classId });
            this.addToast(res.message || '課堂展開與日曆同步完成！', 'success');
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },

        async terminateClassSingle(classId) {
          try {
            this.addToast('🚫 系統正在終止此班級開班與後續自動續期...', 'info');
            const res = await this.apiCall('admin.terminateClass', { classId });
            this.addToast(res.message || '🚫 班級已成功終止開班！', 'success');
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },
        
        async openRenewModal(cls) {
          try {
            this.renewForm.classId = cls.classId;
            this.renewForm.className = cls.className;
            
            // 推算下週的同一個星期幾作為預設新開課日
            const oldStart = new Date(cls.periodStart);
            if (!isNaN(oldStart.getTime())) {
              const nextStart = new Date(oldStart.getTime() + (cls.periodWeeks || 12) * 7 * 24 * 60 * 60 * 1000);
              this.renewForm.newStartDate = nextStart.toISOString().split('T')[0];
            } else {
              this.renewForm.newStartDate = new Date().toISOString().split('T')[0];
            }

            const year = new Date().getFullYear();
            this.renewForm.termRemark = `${year}年新一期`;

            this.addToast('正在加載本班舊學員名單...', 'info');
            const members = await this.apiCall('admin.getClassMembers', { classId: cls.classId });
            this.renewForm.allClassMembers = members;
            this.renewForm.renewMemberIds = members.map(m => m.memberId);
            this.showRenewModal = true;
          } catch (e) {
            console.error(e);
          }
        },

        async submitRenewClass() {
          if (!this.renewForm.newStartDate) {
            this.addToast('請選擇新一期開課日期！', 'error');
            return;
          }
          try {
            this.addToast('正在處理一鍵續期及學員 Rollover 轉移...', 'info');
            const res = await this.apiCall('admin.renewClass', {
              classId: this.renewForm.classId,
              newStartDate: this.renewForm.newStartDate,
              renewMemberIds: this.renewForm.renewMemberIds,
              termRemark: this.renewForm.termRemark
            });
            this.addToast(res.message || '🔄 班級一鍵續期與學員 Rollover 成功！', 'success');
            this.showRenewModal = false;
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },

        async confirmTuitionPayment(classId, memberId) {
          if (!confirm('💰 確定要確認收費並正式開通該學員的課程權限嗎？\n系統將自動發送 LINE Flex 繳費收據通知該學員！')) {
            return;
          }
          try {
            this.addToast('正在進行學費核點與 LINE Flex 繳費收據發送...', 'info');
            const res = await this.apiCall('admin.confirmPayment', { classId, memberId });
            this.addToast(res.message || '🟢 學費核收成功，繳費收據已推送！', 'success');
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },
        
        async batchConfirmTuitionPayment() {
          const count = this.selectedEnrollments.length;
          if (count === 0) return;
          
          if (!confirm(`💰 確定要批量確認這 ${count} 筆學生的學費收訖並正式開通其課程權限嗎？\n系統將自動發送 LINE Flex 繳費收據給這 ${count} 位學員！`)) {
            return;
          }
          
          try {
            this.addToast(`正在進行 ${count} 筆學費批量核點與 Google 日曆同步，請稍候...`, 'info');
            const items = this.selectedEnrollments.map(str => {
              const [classId, memberId] = str.split(':');
              return { classId, memberId };
            });
            
            const res = await this.apiCall('admin.batchConfirmPayments', { items });
            this.addToast(res.message || `🟢 成功批量核收 ${count} 筆學費，憑證均已推送！`, 'success');
            
            // 成功後重設選取狀態
            this.selectedEnrollments = [];
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },
        
        async submitAdminRegister() {
          try {
            const result = await this.apiCall('member.bind', {
              realName: this.adminBindForm.realName,
              birthday: this.adminBindForm.birthday
            });
            this.addToast(`學員「${this.adminBindForm.realName}」預先登記成功！`, 'success');
            this.adminBindForm.realName = '';
            this.adminBindForm.birthday = '';
          } catch (e) {
            console.error(e);
          }
        },
        
        async submitPublishAnnouncement() {
          if (!this.announcementForm.title || !this.announcementForm.content) {
            this.addToast('請填寫完整的公告標題與內容！', 'error');
            return;
          }
          try {
            this.addToast('正在發布系統公告...', 'info');
            const result = await this.apiCall('admin.publishAnnouncement', {
              title: this.announcementForm.title,
              content: this.announcementForm.content,
              type: this.announcementForm.type,
              sendLine: this.announcementForm.sendLine
            });
            this.addToast(result.message || '📢 系統公告發布成功！', 'success');
            this.showAnnouncementModal = false;
            // 重設表單
            this.announcementForm.title = '';
            this.announcementForm.content = '';
            this.announcementForm.type = 'info';
            this.announcementForm.sendLine = false;
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },

        async syncRichMenus() {
          if (!confirm('確定要重新同步 LINE 圖文選單？此操作會重新建立或覆蓋官方帳號圖文選單，可能影響所有使用者。')) {
            return;
          }
          try {
            this.addToast('⏳ 正在向 LINE 同步覆蓋圖文選單圖，大約需要 5-10 秒，請稍候...', 'info');
            this.loading = true;
            await this.apiCall('admin.updateRichMenus');
            this.loading = false;
            this.addToast('🎉 圖文選單重新建立與圖片同步成功！請在 LINE 查看效果。', 'success');
          } catch (e) {
            this.loading = false;
            console.error(e);
            this.addToast('❌ 圖片上傳同步失敗：' + (e.message || e), 'error');
          }
        },
        
        // Load available classes from classes.available API (v2.0)
        async loadAvailableClasses() {
          try {
            this.studentBindForm.availableClasses = await this.apiCall('classes.available', {
              type: this.studentBindForm.classType,
              gender: this.studentBindForm.gender
            });
          } catch (e) {
            console.error(e);
            this.addToast('無法載入可用班級時段，請稍後再試。', 'error');
          }
        },

        // Student Bind
        async submitStudentBind() {
          try {
            const result = await this.apiCall('member.bind', {
              realName: this.studentBindForm.realName,
              gender: this.studentBindForm.gender,
              birthday: this.studentBindForm.birthday,
              height: Number(this.studentBindForm.height),
              weight: Number(this.studentBindForm.weight),
              classId: this.studentBindForm.classId
            });
            
            this.addToast(`帳號安全綁定與選課預約成功！歡迎，「${result.member.realName}」！`, 'success');
            this.studentProfile.realName = result.member.realName;
            this.studentProfile.level = result.member.level;
            
            // 跳轉至成功畫面
            this.studentBindForm.step = 5;
            
            // 若在 LINE App 內，發送訊息後自動關閉 LIFF 視窗
            if (typeof liff !== 'undefined' && liff.isInClient()) {
              liff.sendMessages([
                {
                  type: 'text',
                  text: `【GymOS 帳號綁定】我已完成帳號安全綁定與選課預約，預約班級ID：${this.studentBindForm.classId}。`
                }
              ]).then(() => {
                setTimeout(() => { liff.closeWindow(); }, 1500);
              }).catch(err => {
                console.error('LIFF sendMessages failed:', err);
                setTimeout(() => { liff.closeWindow(); }, 1500);
              });
            } else {
              // 非 LINE 環境，3 秒後跳轉或保留
            }
          } catch (e) {
            console.error(e);
            const errMsg = e.message || String(e);
            // 409 防爆防呆特判
            if (errMsg.indexOf('額滿') !== -1) {
              this.addToast('很抱歉，此時段剛剛額滿，請重新選擇時段！', 'error');
              // 重新撈取最新人數
              await this.loadAvailableClasses();
              this.studentBindForm.step = 3; // 跳回時段選擇步驟
            }
          }
        },

        // Student Self Enroll
        async submitEnrollNewClass(cls) {
          try {
            this.addToast('正在送出課程加選申請...', 'info');
            const result = await this.apiCall('member.enrollNewClass', {
              classId: cls.classId,
              isOverlimit: cls.isOverlimit
            });
            this.addToast(`🎉 成功加選「${result.className}」！`, 'success');
            this.studentEnrollForm.successData = result;

            if (typeof liff !== 'undefined' && liff.isInClient()) {
              liff.sendMessages([
                {
                  type: 'text',
                  text: `【GymOS 加選課程】我已完成加選課程申請，加選班級：${result.className}。`
                }
              ]).catch(err => {
                console.error('LIFF sendMessages failed:', err);
              });
            }
          } catch (e) {
            console.error(e);
          }
        },
        
        // Student Leave
        async submitLeaveRequest() {
          if (!this.leaveForm.sessionId) {
            this.addToast('請選擇欲請假的課堂！', 'error');
            return;
          }
          const submittedSessionId = this.leaveForm.sessionId;
          try {
            const result = await this.apiCall('leave.request', {
              sessionId: submittedSessionId,
              reason: this.leaveForm.reason
            });
            
            // 成功後直接從本地狀態移除已請假的課堂，不再走第二次 API ！
            this.upcomingSessions = this.upcomingSessions.filter(s => s.sessionId !== submittedSessionId);
            this.leaveForm.sessionId = '';
            this.leaveForm.reason = '';
            
            // 更新儀表板計數器
            this.studentProfile.leaveCount = (this.studentProfile.leaveCount || 0) + 1;
            this.studentProfile.remainingCount = Math.max(0, (this.studentProfile.remainingCount || 0) - 1);
            
            this.activeSubView = '';
            
            this.addToast(`✅ 請假成功！已自動釋出補課額度。`, 'success');
            const leaveDate = this.formatDateYMD(result.sessionDate);
            const leaveTime = this.formatTime(result.startTime);
            
            // 在 LINE App 內，發送訊息後 1.5 秒自動關閉 LIFF 視窗
            if (typeof liff !== 'undefined' && liff.isInClient()) {
              liff.sendMessages([
                {
                  type: 'text',
                  text: `【GymOS 請假申請】我已於系統完成請假登記，請假課堂日期：${leaveDate} ${leaveTime}。`
                }
              ]).then(() => {
                setTimeout(() => { liff.closeWindow(); }, 1500);
              }).catch(err => {
                console.error('LIFF sendMessages failed:', err);
                setTimeout(() => { liff.closeWindow(); }, 1500);
              });
            }
          } catch (e) {
            console.error(e);
          }
        },
        
        // Student Makeup
        async queryAvailableMakeups(leaveId) {
          try {
            const slots = await this.apiCall('makeup.available', { leaveId });
            this.availableSlots = slots;
            // 每次重新選擇請假額度，重置篩選與顯示數量
            this.makeupForm.filterDate = '7days';
            this.makeupForm.displayLimit = 5;
            this.makeupForm.targetSessionId = '';
          } catch (e) {
            console.error(e);
          }
        },
        
        async submitMakeupRequest() {
          if (!this.makeupForm.leaveId || !this.makeupForm.targetSessionId) {
            this.addToast('請選擇完整的補課匹配課堂！', 'error');
            return;
          }
          if (!confirm('確認預約此補課時段？\n注意：名額寶貴，預約成功後即無法更改或取消！')) return;
          try {
            const result = await this.apiCall('makeup.request', {
              leaveId: this.makeupForm.leaveId,
              targetSessionId: this.makeupForm.targetSessionId
            });
            const makeupDate = this.formatDateYMD(result.sessionDate);
            const makeupTime = this.formatTime(result.startTime);
            this.addToast(`補課預約成功！目標時段: ${makeupDate} ${makeupTime} (${result.className})`, 'success');
            this.makeupForm.leaveId = '';
            this.makeupForm.targetSessionId = '';
            this.makeupForm.filterDate = '7days';
            this.makeupForm.displayLimit = 5;
            this.availableSlots = [];
            this.activeSubView = '';
            this.loadInitialData();

            // 在 LINE App 內，發送訊息後 1.5 秒自動關閉 LIFF 視窗
            if (typeof liff !== 'undefined' && liff.isInClient()) {
              liff.sendMessages([
                {
                  type: 'text',
                  text: `【GymOS 補課預約】我已於系統預約補課成功，目標補課課堂：${result.className} (${makeupDate} ${makeupTime})。`
                }
              ]).then(() => {
                setTimeout(() => { liff.closeWindow(); }, 1500);
              }).catch(err => {
                console.error('LIFF sendMessages failed:', err);
                setTimeout(() => { liff.closeWindow(); }, 1500);
              });
            }
          } catch (e) {
            console.error(e);
          }
        },
        


        // 一鍵重置資料庫與課程種子 (僅限 admin)
        async resetDatabaseAndSeed() {
          if (!confirm('⚠️ 確定要重置資料庫並導入最新的 17 班課程種子資料嗎？\n這將會清除所有舊資料，並自動為這 17 個班展開整整上百堂課的課堂 Sessions 與 Google 日曆事件！')) {
            return;
          }
          try {
            this.addToast('正在初始化資料庫與自動展開 Google 日曆事件，此過程大約需要 5~15 秒，請勿關閉視窗...', 'info');
            const res = await this.apiCall('admin.resetDatabase');
            this.addToast(res.message || '資料庫重置與課程種子排程展開成功！', 'success');
            this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },
        
        // Render Calendar using FullCalendar
        renderCalendar() {
          const calendarEl = document.getElementById('calendar');
          if (!calendarEl) return;
          
          if (this.calendarInstance) {
            this.calendarInstance.destroy();
          }
          
          this.calendarInstance = new FullCalendar.Calendar(calendarEl, {
            initialView: window.innerWidth < 768 ? 'listWeek' : 'timeGridWeek',
            height: window.innerWidth < 768 ? 'auto' : 650,
            eventTimeFormat: {
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            },
            slotLabelFormat: {
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            },
            headerToolbar: {
              left: 'prev,next today',
              center: 'title',
              right: window.innerWidth < 768 ? 'listWeek,timeGridDay' : 'listWeek,timeGridWeek,timeGridDay'
            },
            slotMinTime: '08:00:00',
            slotMaxTime: '22:00:00',
            allDaySlot: false,
            locale: 'zh-tw',
            events: async (info, successCallback, failureCallback) => {
              try {
                // Fetch schedule dates from backend
                const schedule = await this.apiCall('admin.getSchedule', { date: info.startStr.split('T')[0] });
                
                const events = schedule.map(s => {
                  // Map database status to nice colors
                  let color = '#8b5cf6'; // Scheduled
                  if (s.status === 'completed') color = '#10b981'; // Completed
                  if (s.status === 'cancelled') color = '#ef4444'; // Cancelled
                  
                  return {
                    id: s.sessionId,
                    title: `${s.className} (${s.actualCount}/${s.maxCapacity}人)`,
                    start: `${s.date}T${s.startTime}:00`,
                    end: `${s.date}T${s.endTime}:00`,
                    backgroundColor: color,
                    borderColor: color,
                    extendedProps: {
                      roomName: s.roomName,
                      students: s.students,
                      status: s.status
                    }
                  };
                });
                successCallback(events);
              } catch (e) {
                failureCallback(e);
              }
            },
            eventClick: (info) => {
              const props = info.event.extendedProps;
              const studentList = props.students.map(s => `• ${s.realName} (${s.type === 'makeup' ? '補課生' : '正式生'}) - ${s.status === 'present' ? '出席' : (s.status === 'leave' ? '請假' : '曠課')}`).join('\n');
              
              alert(`【課程名冊詳情】\n班級: ${info.event.title}\n教室: ${props.roomName}\n狀態: ${props.status}\n\n學生清冊:\n${studentList || '(無學員)'}`);
            }
          });
          
          this.calendarInstance.render();
        }
      }));
    });
  </script>
