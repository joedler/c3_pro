<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymOS — 智慧健身房管理系統 (PRD v3.0)</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- LINE LIFF SDK 已移至下方統一載入，避免重複引入浪費載入時間 -->
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'Noto Sans TC', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              900: '#4c1d95',
            }
          }
        }
      }
    }
  </script>
  
  <!-- FullCalendar.js CDN -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  
  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <style>
    [x-cloak] { display: none !important; }
    body {
      background-color: #0b0f19;
      background-image: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.07) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.07) 0px, transparent 50%);
    }
    .fc-theme-standard td, .fc-theme-standard th {
      border-color: #1e293b !important;
    }
    .fc .fc-button-primary {
      background-color: #7c3aed !important;
      border-color: #6d28d9 !important;
    }
    .fc .fc-button-primary:hover {
      background-color: #8b5cf6 !important;
    }
    
    /* 隱藏橫向滾動條 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 美化 FullCalendar List 視圖的日期與星期標頭 (深灰底白字，極佳對比) */
    .fc .fc-list-day-cushion,
    .fc-list-day-cushion {
      background-color: #1e293b !important;
      color: #f8fafc !important;
      font-weight: 700 !important;
      padding: 10px 16px !important;
    }
    .fc .fc-list-day,
    .fc-list-day {
      background-color: #1e293b !important;
    }

    /* 美化 FullCalendar Day/Week (TimeGrid) 視圖的欄位標頭 (深灰底白字，絕非白色淺字) */
    .fc-theme-standard th,
    .fc .fc-col-header-cell,
    .fc-col-header-cell {
      background-color: #1e293b !important;
      border-color: #1e293b !important;
    }
    .fc .fc-col-header-cell-cushion,
    .fc-col-header-cell-cushion {
      color: #f8fafc !important;
      font-weight: 700 !important;
      padding: 10px 0 !important;
      display: inline-block !important;
      text-decoration: none !important;
    }

    /* 美化 FullCalendar 左側時間軸標籤 */
    .fc .fc-timegrid-slot-label,
    .fc-timegrid-slot-label,
    .fc .fc-timegrid-slot-label-cushion,
    .fc-timegrid-slot-label-cushion {
      color: #cbd5e1 !important; /* 淺灰色，高對比易讀 */
      font-weight: 600 !important;
      font-size: 11px !important;
    }

    /* 手機版日曆與表格外觀極致美化與防擠壓 */
    @media (max-width: 768px) {
      .fc .fc-header-toolbar,
      .fc .fc-toolbar,
      div.fc-header-toolbar {
        flex-direction: column !important;
        gap: 8px !important;
        align-items: center !important;
        margin-bottom: 12px !important;
      }
      .fc .fc-toolbar-title,
      .fc-toolbar-title {
        font-size: 1.15rem !important;
        text-align: center !important;
        font-weight: 800 !important;
        background: linear-gradient(to right, #ffffff, #94a3b8) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        margin: 4px 0 !important;
      }
      .fc .fc-toolbar-chunk,
      .fc-toolbar-chunk {
        display: flex !important;
        justify-content: center !important;
        flex-wrap: wrap !important;
        gap: 4px !important;
      }
      .fc .fc-button,
      .fc-button {
        padding: 6px 12px !important;
        font-size: 11px !important;
      }

      /* List 模式下時間與標題改為垂直雙行佈局，解決單行擠壓字體豎列 Bug */
      .fc .fc-list-event {
        display: flex !important;
        flex-direction: column !important;
        padding: 12px 16px !important;
        border-bottom: 1px solid #1e293b !important;
        align-items: flex-start !important;
      }
      .fc .fc-list-event-time,
      .fc .fc-list-event-title {
        display: block !important;
        width: 100% !important;
        padding: 2px 0 !important;
        background: transparent !important;
        border: none !important;
        text-align: left !important;
      }
      .fc .fc-list-event-time {
        font-size: 11px !important;
        color: #a78bfa !important; /* 高亮淡紫色 */
        font-weight: 600 !important;
        margin-bottom: 4px !important;
      }
      .fc .fc-list-event-title {
        font-size: 13px !important;
        color: #ffffff !important;
        font-weight: 700 !important;
        white-space: normal !important;
      }
      .fc .fc-list-event-dot {
        display: none !important; /* 隱藏圓點以利排版 */
      }

      /* 將 Table 轉換為 Card-based Grid 佈局，實現手機版極致響應式，避免橫向滾動 */
      .overflow-x-auto table, 
      .overflow-x-auto thead, 
      .overflow-x-auto tbody, 
      .overflow-x-auto th, 
      .overflow-x-auto td, 
      .overflow-x-auto tr { 
        display: block !important; 
        width: 100% !important;
      }
      .overflow-x-auto thead {
        display: none !important; /* 手機端隱藏表頭 */
      }
      .overflow-x-auto tr {
        margin-bottom: 16px !important;
        background-color: rgba(30, 41, 59, 0.4) !important;
        border: 1px solid rgba(51, 65, 85, 0.5) !important;
        border-radius: 16px !important;
        padding: 14px 16px !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
      }
      .overflow-x-auto td {
        padding: 6px 0 !important;
        border: none !important;
        text-align: left !important;
      }
      .overflow-x-auto td:last-child {
        border-top: 1px solid rgba(51, 65, 85, 0.3) !important;
        padding-top: 12px !important;
        margin-top: 8px !important;
        display: flex !important;
        justify-content: flex-end !important;
        gap: 8px !important;
      }
    }
  </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col antialiased" x-data="gymApp" x-init="init()" x-cloak>

  <!-- Global Toast Alerts -->
  <div class="fixed top-5 right-5 z-[60] flex flex-col gap-2 max-w-sm">
    <template x-for="toast in toasts" :key="toast.id">
      <div :class="{
        'bg-slate-900/90 border-emerald-500/30 text-emerald-400': toast.type === 'success',
        'bg-slate-900/90 border-rose-500/30 text-rose-400': toast.type === 'error',
        'bg-slate-900/90 border-brand-500/30 text-brand-400': toast.type === 'info'
      }" class="p-4 rounded-xl border backdrop-blur-md shadow-2xl flex items-center gap-3 transition-all duration-300">
        <span class="text-lg">⚡</span>
        <div class="flex-grow text-xs font-semibold" x-text="toast.message"></div>
        <button @click="removeToast(toast.id)" class="text-slate-500 hover:text-slate-300">&times;</button>
      </div>
    </template>
  </div>

  <!-- Header / Navigation -->
  <header class="border-b border-slate-800/80 bg-slate-950/40 backdrop-blur-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-blue-500 flex items-center justify-center shadow-lg shadow-brand-500/20">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="text-xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent tracking-wide">GymOS</span>
        <span class="px-2 py-0.5 text-[9px] font-semibold bg-brand-500/10 border border-brand-500/20 text-brand-500 rounded-full" x-text="'v3.0 ' + currentMode.toUpperCase()"></span>
      </div>

      <!-- Route switcher for Dev Sandbox -->
      <div class="hidden lg:flex items-center gap-2 bg-slate-900 p-1 rounded-xl border border-slate-800 text-xs">
        <button @click="switchMode('admin')" :class="currentMode === 'admin' ? 'bg-brand-600 text-white' : 'text-slate-400'" class="px-2.5 py-1.5 rounded-lg font-medium transition-all">管理端</button>
        <button @click="switchMode('bind')" :class="currentMode === 'bind' ? 'bg-brand-600 text-white' : 'text-slate-400'" class="px-2.5 py-1.5 rounded-lg font-medium transition-all">學員綁定</button>
        <button @click="switchMode('leave')" :class="currentMode === 'leave' ? 'bg-brand-600 text-white' : 'text-slate-400'" class="px-2.5 py-1.5 rounded-lg font-medium transition-all">請假申請</button>
        <button @click="switchMode('makeup')" :class="currentMode === 'makeup' ? 'bg-brand-600 text-white' : 'text-slate-400'" class="px-2.5 py-1.5 rounded-lg font-medium transition-all">補課預約</button>
        <button @click="switchMode('coach')" :class="currentMode === 'coach' ? 'bg-brand-600 text-white' : 'text-slate-400'" class="px-2.5 py-1.5 rounded-lg font-medium transition-all">教練端</button>
      </div>

      <div class="flex items-center gap-3">
        <!-- Configuration settings -->
        <button @click="showConfig = true" class="p-2 bg-slate-900 border border-slate-800 text-slate-400 hover:text-white rounded-lg transition-all" title="設定 API 網址">
          ⚙️
        </button>
        <div class="hidden sm:flex flex-col text-right">
          <span class="text-xs font-bold text-white" x-text="sessionUser.name"></span>
          <span class="text-[10px] text-slate-500 uppercase font-semibold" x-text="sessionUser.role"></span>
        </div>
      </div>
    </div>
  </header>

  <!-- Configuration Modal -->
  <div x-show="showConfig" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50" x-transition>
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-md shadow-2xl relative">
      <h3 class="text-lg font-bold text-white mb-4">⚙️ 系統 API 連線設定</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1.5">Apps Script 網頁應用程式網址</label>
          <input type="text" x-model="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-brand-500">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1.5">測試用模擬 LINE Token / UID</label>
          <input type="text" x-model="devToken" placeholder="例如: TEST_UID_MEMBER_001" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-brand-500">
        </div>
        <p class="text-[10px] text-slate-500 leading-relaxed">
          * 請在此貼上您發佈部署的 Google Apps Script Web App URL。設定會保存在瀏覽器的 LocalStorage。
        </p>
      </div>
      <div class="flex gap-3 mt-6">
        <button @click="saveConfiguration()" class="flex-grow bg-brand-600 hover:bg-brand-500 text-white rounded-xl py-3 text-xs font-bold transition-all">儲存並重新載入</button>
        <button @click="showConfig = false" class="bg-slate-800 hover:bg-slate-700 text-white rounded-xl px-6 py-3 text-xs font-bold transition-all">關閉</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div x-show="loading" class="fixed inset-0 bg-slate-950/50 backdrop-blur-sm flex flex-col items-center justify-center z-50" x-transition>
    <div class="w-10 h-10 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
    <span class="text-xs text-slate-400 mt-4 font-bold tracking-widest">系統處理中，請稍候...</span>
  </div>

  <!-- MAIN APP CONTAINER -->
  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- ================= ADMIN CONSOLE PANEL ================= -->
    <template x-if="currentMode === 'admin'">
      <div class="space-y-8" x-data="{ showClassModal: false, showBindModal: false }">
        
        <!-- Hero stats -->
        <div class="relative rounded-3xl overflow-hidden border border-slate-800 bg-slate-900/20 backdrop-blur-xl p-8 sm:p-10">
          <div class="relative z-10 max-w-3xl">
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-brand-500/10 text-brand-500 border border-brand-500/25 mb-4">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
              全中文試算表資料庫已對齊
            </span>
            <h1 class="text-2xl sm:text-4xl font-black text-white leading-tight mb-3 tracking-tight">
              C3 Fitness <span class="bg-gradient-to-r from-brand-500 via-purple-400 to-blue-500 bg-clip-text text-transparent">管理控制台</span>
            </h1>
            <p class="text-slate-400 text-sm leading-relaxed max-w-2xl">
              基於雙向 ORM 架構：試算表端 100% 呈現精美繁體中文（班級設定、學員資料等），代碼業務邏輯層採用乾淨標準的英文命名。
            </p>
          </div>
        </div>

        <!-- Dashboard panel switcher -->
        <div class="bg-slate-900/10 border border-slate-800 rounded-3xl overflow-hidden backdrop-blur-md">
          <div class="border-b border-slate-800 bg-slate-950/60 px-6 py-4 flex flex-wrap gap-2 justify-between items-center">
            <h2 class="text-sm font-bold text-white tracking-wide flex items-center gap-2">
              <span>📊</span>
              <span x-text="activeTab === 'dashboard' ? '首頁摘要與公告欄' : (activeTab === 'classes' ? '班級管理與一鍵續期中心' : (activeTab === 'ledger' ? '學費待繳核點與 LINE 收據中心' : '營運課表與實時狀態'))"></span>
            </h2>
            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800 w-full md:w-auto space-x-1">
              <button @click="activeTab = 'dashboard'" :class="activeTab === 'dashboard' ? 'bg-brand-600 text-white' : 'text-slate-400 hover:text-white'" class="flex-1 md:flex-none md:px-4 py-2 text-[11px] font-semibold rounded-lg transition-all">🏠 首頁</button>
              <button @click="activeTab = 'classes'" :class="activeTab === 'classes' ? 'bg-brand-600 text-white' : 'text-slate-400 hover:text-white'" class="flex-1 md:flex-none md:px-4 py-2 text-[11px] font-semibold rounded-lg transition-all">🏫 班級</button>
              <button @click="activeTab = 'ledger'" :class="activeTab === 'ledger' ? 'bg-brand-600 text-white' : 'text-slate-400 hover:text-white'" class="flex-1 md:flex-none md:px-4 py-2 text-[11px] font-semibold rounded-lg transition-all">💰 學費</button>
              <button @click="activeTab = 'schedule'; setTimeout(() => renderCalendar(), 100)" :class="activeTab === 'schedule' ? 'bg-brand-600 text-white' : 'text-slate-400 hover:text-white'" class="flex-1 md:flex-none md:px-4 py-2 text-[11px] font-semibold rounded-lg transition-all">📅 課表</button>
            </div>
          </div>

          <div class="p-6">
            <!-- Summary Tab -->
            <div x-show="activeTab === 'dashboard'" class="space-y-6">
              <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Announcement Board -->
                <div class="bg-slate-950/40 border border-slate-800 rounded-2xl p-6 lg:col-span-2 space-y-4">
                  <div class="flex justify-between items-center">
                    <h3 class="text-white font-bold text-sm flex items-center gap-2">📢 系統最新公告</h3>
                    <button @click="publishAnnouncement()" class="px-3 py-1.5 text-[10px] bg-brand-500/10 text-brand-400 rounded-lg hover:bg-brand-500/20 transition-all font-semibold border border-brand-500/20">發布公告</button>
                  </div>
                  <div class="space-y-3">
                    <div class="p-4 bg-slate-900/60 border border-slate-800 rounded-xl">
                      <span class="inline-block px-2 py-0.5 text-[9px] bg-rose-500/10 text-rose-400 rounded-full font-bold border border-rose-500/20 mb-2">重要通知</span>
                      <h4 class="text-xs font-bold text-white mb-1">GymOS v3.0 系統全新升級上線</h4>
                      <p class="text-[11px] text-slate-400 leading-relaxed">
                        本期起已全面啟用「共享 Google 日曆即時同步」功能。無論是學員請假、跨班預約補課，還是教練現場調整課表，Google 日曆皆會在 1 秒內自動完成學員出席名單校正與描述欄更新！
                      </p>
                    </div>
                  </div>
                </div>

                <!-- Database status -->
                <div class="bg-slate-950/40 border border-slate-800 rounded-2xl p-6 space-y-4">
                  <h3 class="text-white font-bold text-sm flex items-center gap-2">📁 資料庫連線檢驗</h3>
                  <div class="space-y-2">
                    <div class="flex items-center justify-between text-xs p-2.5 bg-slate-900/40 border border-slate-800 rounded-lg">
                      <span class="text-slate-400">系統設定表格 `Config`</span>
                      <span class="text-emerald-400 font-bold">連線正常</span>
                    </div>
                    <div class="flex items-center justify-between text-xs p-2.5 bg-slate-900/40 border border-slate-800 rounded-lg">
                      <span class="text-slate-400">學員資料表格 `Members`</span>
                      <span class="text-emerald-400 font-bold">連線正常</span>
                    </div>
                    <div class="flex items-center justify-between text-xs p-2.5 bg-slate-900/40 border border-slate-800 rounded-lg">
                      <span class="text-slate-400">課堂紀錄表格 `Sessions`</span>
                      <span class="text-emerald-400 font-bold">連線正常</span>
                    </div>
                    <!-- Premium One-click DB Reset Button for Independent GAS -->
                    <button @click="resetDatabaseAndSeed()" class="w-full mt-4 py-2.5 px-4 bg-rose-600/10 hover:bg-rose-600/20 text-rose-400 border border-rose-500/20 rounded-xl text-xs font-bold transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-rose-950/20 active:scale-95">
                      <span>🗃️</span>
                      <span>一鍵重置資料庫與課程種子</span>
                    </button>
                    <!-- Premium One-click Rich Menu Sync Button -->
                    <button @click="syncRichMenus()" class="w-full mt-2 py-2.5 px-4 bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 border border-indigo-500/20 rounded-xl text-xs font-bold transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-indigo-950/20 active:scale-95">
                      <span>🖼️</span>
                      <span>一鍵同步 LINE 圖文選單</span>
                    </button>
                  </div>
                </div>


              </div>
            </div>

            <!-- Classes & Renewal Tab (Upgraded v3.0) -->
            <div x-show="activeTab === 'classes'" class="space-y-6" x-transition>
              <div class="flex justify-between items-center bg-slate-900/60 p-4 border border-slate-800 rounded-2xl">
                <div>
                  <h3 class="text-white font-bold text-sm">🏫 班級藍圖與開班管理</h3>
                  <p class="text-[11px] text-slate-400">在此查看所有的課程藍圖設定，並執行單班獨立開班或一鍵續期轉移舊學員。</p>
                </div>
                <button @click="showClassModal = true" class="px-4 py-2 text-xs font-bold text-white bg-brand-600 hover:bg-brand-500 rounded-xl transition-all flex items-center gap-1.5 shadow-lg shadow-brand-950/20 active:scale-95">
                  <span>➕ 新增課程藍圖</span>
                </button>
              </div>

              <!-- Session Suspension panel -->
              <div class="bg-slate-950/40 border border-slate-800 rounded-2xl p-6 space-y-4">
                <h3 class="text-white font-bold text-sm flex items-center gap-2">🛠️ 課程臨時調整中心 (停課/代課)</h3>
                <p class="text-[11px] text-slate-400">
                  一律在網頁中完成，不需查看後台試算表！系統會自動即時與 Google 日曆及 LINE 完成同步。
                </p>
                
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" x-data="{ adjustScope: 'session', selectedSessionId: '', suspendDate: '', adjustReason: '', adjustSubCoach: '', extendWeeks: 0, grantMakeupPoints: true }">
                  <!-- Scope selection -->
                  <div class="sm:col-span-3 bg-slate-900/60 p-3.5 rounded-xl border border-slate-800 flex items-center gap-6 text-xs text-slate-300">

  <!-- ================= ALPINE.JS GLOBAL STATE LOGIC ================= -->
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('gymApp', () => ({
        // GAS URL connection (生產環境固定金鑰)
        gasUrl: 'https://script.google.com/macros/s/AKfycbw5qd3RILHE1zkWfFLJfcDL-Mitfx2UcHj9cyzETaISKgwONltAcm1SL36Z_EK3lFAp/exec',
        devToken: localStorage.getItem('gymos_dev_token') || 'TEST_UID_MEMBER_001',
        showConfig: false,
        loading: false,
        liffReady: false,
        activeLiffId: '初始化中...',
        toasts: [],
        
        // Navigation / Routing
        currentMode: 'admin', // 'admin' | 'bind' | 'leave' | 'makeup' | 'coach'
        activeTab: 'dashboard', // For admin panel: 'dashboard' | 'schedule'
        
        // Mock profile / Session State
        sessionUser: {
          uid: 'MOCK_MEMBER_001',
          role: 'admin',
          name: '訪客管理員'
        },
        
        // Form states
        classForm: {
          className: '',
          classType: 'group_1x',
          level: 'L1',
          coachLineUid: '',
          roomId: '',
          maxCapacity: 15,
          dayOfWeek: '',
          startTime: '19:00',
          endTime: '20:00',
          periodStart: new Date().toISOString().split('T')[0],
          periodWeeks: 12
        },
        
        adminBindForm: {
          realName: '',
          birthday: ''
        },
        
        studentBindForm: {
          step: 1,
          realName: '',
          gender: '女',
          birthday: '',
          height: '',
          weight: '',
          classType: 'A',
          classId: '',
          availableClasses: []
        },
        
        leaveForm: {
          sessionId: '',
          reason: ''
        },
        
        makeupForm: {
          leaveId: '',
          targetSessionId: ''
        },
        
        // Admin upgraded v3.0 states
        adminClasses: [],
        adminRooms: [],
        adminCoaches: [],
        pendingPayments: [],
        showRenewModal: false,
        renewForm: {
          classId: '',
          className: '',
          newStartDate: '',
          renewMemberIds: [],
          termRemark: 'Q3續期',
          allClassMembers: []
        },
        
        // Active database caches
        upcomingSessions: [],
        pendingLeaves: [],
        availableSlots: [],
        
        coachSessions: [],
        coachSelectedSessionId: '',
        coachStudentList: [],
        adminSessions: [],
        
        studentProfile: {
          realName: '',
          level: 'L1',
          classNames: '',
          periodInfo: '',
          totalPaid: 0,
          attendedCount: 0,
          leaveCount: 0,
          makeupInfo: '',
          remainingCount: 0
        },
        
        calendarInstance: null,

        // Toast messaging helpers
        addToast(message, type = 'success') {
          const id = Date.now();
          this.toasts.push({ id, message, type });
          setTimeout(() => this.removeToast(id), 5000);
        },
        
        removeToast(id) {
          this.toasts = this.toasts.filter(t => t.id !== id);
        },

        formatTime(timeStr) {
          if (!timeStr) return '';
          try {
            if (String(timeStr).includes('T')) {
              const d = new Date(timeStr);
              if (!isNaN(d.getTime())) {
                const hours = String(d.getHours()).padStart(2, '0');
                const minutes = String(d.getMinutes()).padStart(2, '0');
                return `${hours}:${minutes}`;
              }
            }
          } catch(e) {}
          return String(timeStr).substring(0, 5);
        },

        formatDateMMDD(dateStr) {
          if (!dateStr) return '';
          try {
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
              const m = String(d.getMonth() + 1).padStart(2, '0');
              const day = String(d.getDate()).padStart(2, '0');
              return `${m}/${day}`;
            }
          } catch(e) {}
          return dateStr;
        },

        getPeriodEndMMDD(startStr, weeks, classType) {
          if (!startStr) return '';
          try {
            const d = new Date(startStr);
            if (!isNaN(d.getTime())) {
              if (classType === 'B') {
                // 1-month period B class: end date is the last day of the starting month
                const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0);
                const m = String(lastDay.getMonth() + 1).padStart(2, '0');
                const day = String(lastDay.getDate()).padStart(2, '0');
                return `${m}/${day}`;
              } else {
                // 12-week class: end date is start date + (weeks * 7) - 1 day
                const w = Number(weeks) || 12;
                d.setDate(d.getDate() + (w * 7) - 1);
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${m}/${day}`;
              }
            }
          } catch(e) {}
          return '';
        },

        getUniqueClasses() {
          const seen = new Set();
          const list = [];
          if (Array.isArray(this.adminSessions)) {
            this.adminSessions.forEach(s => {
              if (s.classId && !seen.has(s.classId)) {
                seen.add(s.classId);
                list.push({ classId: s.classId, className: s.className });
              }
            });
          }
          return list;
        },

        // Save backend settings
        saveConfiguration() {
          localStorage.setItem('gymos_gas_url', this.gasUrl);
          localStorage.setItem('gymos_dev_token', this.devToken);
          this.showConfig = false;
          this.addToast('API 連線與認證設定已儲存！系統正在重整...', 'success');
          setTimeout(() => window.location.reload(), 1000);
        },
        
        async init() {
          // 支援 LINE LIFF 特有的 liff.state 參數解碼（避免 LINE 導向時遺失 mode 等路由參數）
          let searchStr = window.location.search;
          const mainParams = new URLSearchParams(searchStr);
          const liffState = mainParams.get('liff.state');
          if (liffState) {
            searchStr = decodeURIComponent(liffState);
          }
          
          const params = new URLSearchParams(searchStr);
          const mode = params.get('mode');
          if (mode) {
            this.currentMode = mode;
          }
          
          const apiParam = params.get('api') || mainParams.get('api');
          if (apiParam) {
            // 確保 GAS 網址保持乾淨，切掉任何意外尾隨的 liff 參數，防範 URL 污染
            let cleanApi = apiParam.split('?')[0].split('&')[0];
            this.gasUrl = cleanApi;
            localStorage.setItem('gymos_gas_url', cleanApi);
          }
          
          // 強大自我修復：確保任何從舊快取/localStorage 讀出的 GAS URL 都是 100% 乾淨的！
          if (this.gasUrl) {
            this.gasUrl = this.gasUrl.split('?')[0].split('&')[0];
            localStorage.setItem('gymos_gas_url', this.gasUrl);
          }


          const liffId = '2010118365-aUSNBtpx';

          // 🚀 頂級商業化：正式初始化 LINE LIFF SDK，解鎖手機 LINE 容器的安全性沙盒，並獲取學員真實身分！
          if (typeof liff !== 'undefined') {
            try {
              this.activeLiffId = liffId;
              
              // 使用 Promise.race 加上 5 秒 Timeout 防護，避免 LIFF ID 不符時死當
              await Promise.race([
                liff.init({ liffId: liffId }),
                new Promise((_, reject) => setTimeout(() => reject(new Error('LIFF SDK 啟動逾時 (可能是 LIFF ID 錯誤或網路不佳)')), 5000))
              ]);
              
              this.liffReady = true;
              
              if (liff.isLoggedIn()) {
                // 取得 LINE 官方核發的 Access Token，用作後端 API 的安全身份驗證！
                const accessToken = liff.getAccessToken();
                if (accessToken) {
                  this.devToken = accessToken;
                  localStorage.setItem('gymos_dev_token', accessToken);
                }
                
                // 取得學員 LINE Profile 資訊
                const profile = await liff.getProfile();
                this.sessionUser = {
                  uid: profile.userId,
                  role: 'member',
                  name: profile.displayName
                };
              } else {
                // 如果未在 LINE 登入，且是在手機端或 LINE 瀏覽器中，自動觸發 LINE 安全登入，確保抓到真實 ID！
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                if (liff.isInClient() || isMobile) {
                  liff.login();
                  return; // 正在進行 LINE 登入轉跳，停止加載後續 API
                }
              }
            } catch (err) {
              console.warn('⚡ LIFF SDK 初始化失敗（可能在非 LINE 瀏覽器環境），切換至 mock 模擬環境：', err);
              const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
              if (isMobile) {
                this.addToast(`LIFF 啟動出錯: ${err.message || err} (使用 ID: ${liffId})`, 'warning');
              }
            }
          }

          // 4. 當連線設定與身份驗證都就緒後，再執行資料加載！
          if (!this.gasUrl) {
            this.showConfig = true;
          } else {
            // 強大防呆防爆：在 LINE 環境中，若無指定特定的 mode 參數（例如點選「我的課表」選單），
            // 自動將學員的 currentMode 路由重導向至學員課表 'leave' 模式，防範跑進 admin 後台導致「權限不足」
            if (typeof liff !== 'undefined' && liff.isLoggedIn() && !mode) {
              this.currentMode = 'leave';
            }
            await this.loadInitialData();
          }
        },
        
        switchMode(mode) {
          this.currentMode = mode;
          // Set query param without reloading to support routing
          const url = new URL(window.location.href);
          url.searchParams.set('mode', mode);
          window.history.pushState({}, '', url);
          
          this.loadInitialData();
        },
        
        // Master API requester
        async apiCall(action, data = {}) {
          if (!this.gasUrl) {
            this.addToast('請先貼上有效的 Apps Script Web App API 網址！', 'error');
            this.showConfig = true;
            throw new Error('Missing GAS URL');
          }
          
          this.loading = true;
          try {
            const response = await fetch(this.gasUrl, {
              method: 'POST',
              mode: 'cors',
              headers: { 'Content-Type': 'text/plain' }, // 極致簡化，防範某些手機瀏覽器（iOS WKWebView）觸發 CORS OPTIONS 預檢阻擋
              body: JSON.stringify({
                action: action,
                token: this.devToken,
                data: data
              })
            });
            
            const res = await response.json();
            if (res.status !== 200) {
              throw new Error(res.data && res.data.error ? res.data.error : 'API 伺服器傳回錯誤');
            }
            return res.data;
          } catch (e) {
            this.addToast(e.message || 'API 連線失敗，請檢查 API 網址是否正確並已啟用 CORS！', 'error');
            throw e;
          } finally {
            this.loading = false;
          }
        },
        
        // Load initial lists according to current mode
        async loadInitialData() {
          try {
            if (this.currentMode === 'admin') {
              this.adminSessions = await this.apiCall('admin.getSessions');
              this.adminClasses = await this.apiCall('admin.getClasses');
              this.pendingPayments = await this.apiCall('admin.getPendingPayments');
              
              try {
                const meta = await this.apiCall('admin.getFormMetaData');
                this.adminRooms = meta.rooms || [];
                this.adminCoaches = meta.coaches || [];
              } catch(e) {
                console.warn('⚡ 無法載入表單中繼資料：', e);
              }
            } else if (this.currentMode === 'bind') {
              // Student binding
            } else if (this.currentMode === 'leave') {
              // 單一 API 呼叫即取得學員資料 + 未來課堂 + 請假紀錄（極速載入！）
              const info = await this.apiCall('member.getInfo');
              if (info.bound) {
                this.studentProfile.realName = info.realName;
                this.studentProfile.level = info.level;
                this.studentProfile.classNames = info.classNames || '';
                this.studentProfile.periodInfo = info.periodInfo || '';
                this.studentProfile.totalPaid = info.totalPaid || 0;
                this.studentProfile.attendedCount = info.attendedCount || 0;
                this.studentProfile.leaveCount = info.leaveCount || 0;
                this.studentProfile.makeupInfo = info.makeupInfo || '';
                this.studentProfile.remainingCount = info.remainingCount || 0;
                
                // 直接從 getInfo 回傳值中提取已內嵌的即時課堂列表
                this.upcomingSessions = info.upcomingSessions || [];
              } else {
                this.addToast('您尚未綁定學員檔案，請先進行綁定。', 'info');
                this.currentMode = 'bind';
              }
            } else if (this.currentMode === 'makeup') {
              // 單一 API 呼叫即取得學員資料 + 待補課紀錄
              const info = await this.apiCall('member.getInfo');
              if (info.bound) {
                // 直接從 getInfo 回傳值中提取已內嵌的即時請假紀錄
                this.pendingLeaves = info.pendingLeaves || [];
              }
            } else if (this.currentMode === 'coach') {
              // Load coach classes and sessions
              const schedule = await this.apiCall('coach.getSchedule');
              this.coachSessions = schedule;
            }
          } catch (e) {
            console.error('Initialization failed', e);
          }
        },
        
        // Admin functions
        async submitCreateClass() {
          try {
            const result = await this.apiCall('admin.createClass', this.classForm);
            this.addToast(`班級「${result.className}」建立成功！總共規劃 ${result.totalSessions} 堂課。`, 'success');
            
            // Trigger batch session expansion
            this.addToast('系統正在自動展開課堂排程並即時同步至 Google 日曆...', 'info');
            await this.apiCall('admin.generateSessions', { classId: result.classId });
            this.addToast('Google 日曆同步完成！課堂結構建構完成。', 'success');
          } catch (e) {
            console.error(e);
          }
        },
        
        async generateSessionsSingle(classId) {
          try {
            this.addToast('⚡ 系統正在單獨展開課堂排程並同步至 Google 日曆...', 'info');
            const res = await this.apiCall('admin.generateSessions', { classId });
            this.addToast(res.message || '課堂展開與日曆同步完成！', 'success');
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },
        
        async openRenewModal(cls) {
          try {
            this.renewForm.classId = cls.classId;
            this.renewForm.className = cls.className;
            
            // 推算下週的同一個星期幾作為預設新開課日
            const oldStart = new Date(cls.periodStart);
            if (!isNaN(oldStart.getTime())) {
              const nextStart = new Date(oldStart.getTime() + (cls.periodWeeks || 12) * 7 * 24 * 60 * 60 * 1000);
              this.renewForm.newStartDate = nextStart.toISOString().split('T')[0];
            } else {
              this.renewForm.newStartDate = new Date().toISOString().split('T')[0];
            }

            const year = new Date().getFullYear();
            this.renewForm.termRemark = `${year}年新一期`;

            this.addToast('正在加載本班舊學員名單...', 'info');
            const members = await this.apiCall('admin.getClassMembers', { classId: cls.classId });
            this.renewForm.allClassMembers = members;
            this.renewForm.renewMemberIds = members.map(m => m.memberId);
            this.showRenewModal = true;
          } catch (e) {
            console.error(e);
          }
        },

        async submitRenewClass() {
          if (!this.renewForm.newStartDate) {
            this.addToast('請選擇新一期開課日期！', 'error');
            return;
          }
          try {
            this.addToast('正在處理一鍵續期及學員 Rollover 轉移...', 'info');
            const res = await this.apiCall('admin.renewClass', {
              classId: this.renewForm.classId,
              newStartDate: this.renewForm.newStartDate,
              renewMemberIds: this.renewForm.renewMemberIds,
              termRemark: this.renewForm.termRemark
            });
            this.addToast(res.message || '🔄 班級一鍵續期與學員 Rollover 成功！', 'success');
            this.showRenewModal = false;
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },

        async confirmTuitionPayment(classId, memberId) {
          if (!confirm('💰 確定要確認收費並正式開通該學員的課程權限嗎？\n系統將自動發送 LINE Flex 繳費收據通知該學員！')) {
            return;
          }
          try {
            this.addToast('正在進行學費核點與 LINE Flex 繳費收據發送...', 'info');
            const res = await this.apiCall('admin.confirmPayment', { classId, memberId });
            this.addToast(res.message || '🟢 學費核收成功，繳費收據已推送！', 'success');
            await this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },
        
        async submitAdminRegister() {
          try {
            const result = await this.apiCall('member.bind', {
              realName: this.adminBindForm.realName,
              birthday: this.adminBindForm.birthday
            });
            this.addToast(`學員「${this.adminBindForm.realName}」預先登記成功！`, 'success');
            this.adminBindForm.realName = '';
            this.adminBindForm.birthday = '';
          } catch (e) {
            console.error(e);
          }
        },
        
        async publishAnnouncement() {
          const title = prompt('請輸入公告標題:');
          const content = prompt('請輸入公告細節內容:');
          if (!title || !content) return;
          
          try {
            await this.apiCall('admin.announcement', { title, content });
            this.addToast('系統公告發布成功！', 'success');
          } catch (e) {
            console.error(e);
          }
        },

        async syncRichMenus() {
          try {
            this.addToast('⏳ 正在向 LINE 同步覆蓋圖文選單圖，大約需要 5-10 秒，請稍候...', 'info');
            this.loading = true;
            await this.apiCall('admin.updateRichMenus');
            this.loading = false;
            this.addToast('🎉 圖文選單重新建立與圖片同步成功！請在 LINE 查看效果。', 'success');
          } catch (e) {
            this.loading = false;
            console.error(e);
            this.addToast('❌ 圖片上傳同步失敗：' + (e.message || e), 'error');
          }
        },
        
        // Load available classes from classes.available API (v2.0)
        async loadAvailableClasses() {
          try {
            this.studentBindForm.availableClasses = await this.apiCall('classes.available', {
              type: this.studentBindForm.classType,
              gender: this.studentBindForm.gender
            });
          } catch (e) {
            console.error(e);
            this.addToast('無法載入可用班級時段，請稍後再試。', 'error');
          }
        },

        // Student Bind
        async submitStudentBind() {
          try {
            const result = await this.apiCall('member.bind', {
              realName: this.studentBindForm.realName,
              gender: this.studentBindForm.gender,
              birthday: this.studentBindForm.birthday,
              height: Number(this.studentBindForm.height),
              weight: Number(this.studentBindForm.weight),
              classId: this.studentBindForm.classId
            });
            
            this.addToast(`帳號安全綁定與選課預約成功！歡迎，「${result.member.realName}」！`, 'success');
            this.studentProfile.realName = result.member.realName;
            this.studentProfile.level = result.member.level;
            
            // 跳轉至成功畫面
            this.studentBindForm.step = 5;
            
            // 若在 LINE App 內，幾秒後自動關閉 LIFF 視窗
            if (typeof liff !== 'undefined' && liff.isInClient()) {
              setTimeout(() => {
                liff.closeWindow();
              }, 3000);
            }
          } catch (e) {
            console.error(e);
            const errMsg = e.message || String(e);
            // 409 防爆防呆特判
            if (errMsg.indexOf('額滿') !== -1) {
              this.addToast('很抱歉，此時段剛剛額滿，請重新選擇時段！', 'error');
              // 重新撈取最新人數
              await this.loadAvailableClasses();
              this.studentBindForm.step = 3; // 跳回時段選擇步驟
            }
          }
        },
        
        // Student Leave
        async submitLeaveRequest() {
          if (!this.leaveForm.sessionId) {
            this.addToast('請選擇欲請假的課堂！', 'error');
            return;
          }
          const submittedSessionId = this.leaveForm.sessionId;
          try {
            const result = await this.apiCall('leave.request', {
              sessionId: submittedSessionId,
              reason: this.leaveForm.reason
            });
            
            // 成功後直接從本地狀態移除已請假的課堂，不再走第二次 API ！
            this.upcomingSessions = this.upcomingSessions.filter(s => s.sessionId !== submittedSessionId);
            this.leaveForm.sessionId = '';
            this.leaveForm.reason = '';
            
            // 更新儀表板計數器
            this.studentProfile.leaveCount = (this.studentProfile.leaveCount || 0) + 1;
            this.studentProfile.remainingCount = Math.max(0, (this.studentProfile.remainingCount || 0) - 1);
            
            this.addToast(`✅ 請假成功！已自動釋出補課額度。`, 'success');
            
            // 在 LINE App 內，2 秒後自動關閉 LIFF 視窗
            if (typeof liff !== 'undefined' && liff.isInClient()) {
              setTimeout(() => { liff.closeWindow(); }, 2000);
            }
          } catch (e) {
            console.error(e);
          }
        },
        
        // Student Makeup
        async queryAvailableMakeups(leaveId) {
          try {
            const slots = await this.apiCall('makeup.available', { leaveId });
            this.availableSlots = slots;
          } catch (e) {
            console.error(e);
          }
        },
        
        async submitMakeupRequest() {
          if (!this.makeupForm.leaveId || !this.makeupForm.targetSessionId) {
            this.addToast('請選擇完整的補課匹配課堂！', 'error');
            return;
          }
          try {
            const result = await this.apiCall('makeup.request', {
              leaveId: this.makeupForm.leaveId,
              targetSessionId: this.makeupForm.targetSessionId
            });
            this.addToast(`補課預約成功！目標時段: ${result.sessionDate} ${result.startTime} (${result.className})`, 'success');
            this.makeupForm.leaveId = '';
            this.makeupForm.targetSessionId = '';
            this.availableSlots = [];
            this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },
        
        // Coach Portal
        loadCoachSessionStudents(sessionId) {
          if (!sessionId) {
            this.coachStudentList = [];
            return;
          }
          const s = this.coachSessions.find(item => item.sessionId === sessionId);
          if (s) {
            // Clone students list to support local edits
            this.coachStudentList = JSON.parse(JSON.stringify(s.students));
          }
        },
        
        async submitCoachCheckin() {
          try {
            await this.apiCall('coach.checkin', {
              sessionId: this.coachSelectedSessionId,
              attendanceList: this.coachStudentList.map(std => ({
                memberId: std.memberId,
                status: std.status
              }))
            });
            this.addToast('現場出席人數與完成紀錄已成功送出！日曆事件已即時重計出席。', 'success');
            this.coachSelectedSessionId = '';
            this.coachStudentList = [];
            this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },

        // 一鍵重置資料庫與課程種子 (僅限 admin)
        async resetDatabaseAndSeed() {
          if (!confirm('⚠️ 確定要重置資料庫並導入最新的 17 班課程種子資料嗎？\n這將會清除所有舊資料，並自動為這 17 個班展開整整上百堂課的課堂 Sessions 與 Google 日曆事件！')) {
            return;
          }
          try {
            this.addToast('正在初始化資料庫與自動展開 Google 日曆事件，此過程大約需要 5~15 秒，請勿關閉視窗...', 'info');
            const res = await this.apiCall('admin.resetDatabase');
            this.addToast(res.message || '資料庫重置與課程種子排程展開成功！', 'success');
            this.loadInitialData();
          } catch (e) {
            console.error(e);
          }
        },
        
        // Render Calendar using FullCalendar
        renderCalendar() {
          const calendarEl = document.getElementById('calendar');
          if (!calendarEl) return;
          
          if (this.calendarInstance) {
            this.calendarInstance.destroy();
          }
          
          this.calendarInstance = new FullCalendar.Calendar(calendarEl, {
            initialView: window.innerWidth < 768 ? 'listWeek' : 'timeGridWeek',
            height: window.innerWidth < 768 ? 'auto' : 650,
            eventTimeFormat: {
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            },
            slotLabelFormat: {
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            },
            headerToolbar: {
              left: 'prev,next today',
              center: 'title',
              right: window.innerWidth < 768 ? 'listWeek,timeGridDay' : 'listWeek,timeGridWeek,timeGridDay'
            },
            slotMinTime: '08:00:00',
            slotMaxTime: '22:00:00',
            allDaySlot: false,
            locale: 'zh-tw',
            events: async (info, successCallback, failureCallback) => {
              try {
                // Fetch schedule dates from backend
                const schedule = await this.apiCall('coach.getSchedule', { date: info.startStr.split('T')[0] });
                
                const events = schedule.map(s => {
                  // Map database status to nice colors
                  let color = '#8b5cf6'; // Scheduled
                  if (s.status === 'completed') color = '#10b981'; // Completed
                  if (s.status === 'cancelled') color = '#ef4444'; // Cancelled
                  
                  return {
                    id: s.sessionId,
                    title: `${s.className} (${s.actualCount}/${s.maxCapacity}人)`,
                    start: `${s.date}T${s.startTime}:00`,
                    end: `${s.date}T${s.endTime}:00`,
                    backgroundColor: color,
                    borderColor: color,
                    extendedProps: {
                      roomName: s.roomName,
                      students: s.students,
                      status: s.status
                    }
                  };
                });
                successCallback(events);
              } catch (e) {
                failureCallback(e);
              }
            },
            eventClick: (info) => {
              const props = info.event.extendedProps;
              const studentList = props.students.map(s => `• ${s.realName} (${s.type === 'makeup' ? '補課生' : '正式生'}) - ${s.status === 'present' ? '出席' : (s.status === 'leave' ? '請假' : '曠課')}`).join('\n');
              
              alert(`【課程名冊詳情】\n班級: ${info.event.title}\n教室: ${props.roomName}\n狀態: ${props.status}\n\n學生清冊:\n${studentList || '(無學員)'}`);
            }
          });
          
          this.calendarInstance.render();
        }
      }));
    });
  </script>
</body>
</html>
